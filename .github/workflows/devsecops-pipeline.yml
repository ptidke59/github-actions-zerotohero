name: DevSecOps Pipeline end to end

on:
  push:
    branches: ["main"]
jobs:
  #CI pipeline with code quality check, secret scan, dependency scan, docker lint and docker build and push to registry
  Code-Quality-Check:
    uses: ./.github/workflows/code-quality.yml

  secret-scan:
    uses: ./.github/workflows/secrets-scan.yml

  dependency-scan:
    uses: ./.github/workflows/dependency-scan.yml

  docker-scan:
    uses: ./.github/workflows/docker-lint.yml

  build-and-push:
    needs: [Code-Quality-Check, secret-scan, dependency-scan, docker-scan]
    uses: ./.github/workflows/docker-build-push.yml
    secrets: inherit

  #image scan with trivy for vulnerabilities and issues in the docker image
  trivy-scan:
    needs: build-and-push
    uses: ./.github/workflows/image-scan.yml
    secrets: inherit

    #deploy to production
  deploy:
    needs: trivy-scan
    uses: ./.github/workflows/deploy-app.yml
    secrets: inherit
