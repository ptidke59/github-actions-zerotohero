name: python linter

on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
      python-version: ["3.10"]

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: install dependencies
        run: |
          python -m pip install -r requirements.txt

      - name: run linter
        run: flake8 app.py
