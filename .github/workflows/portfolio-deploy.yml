name: Portfolio

on:
  push:
    branches: [main]
    paths:
      - "**.html"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}

    steps:
      # get access to profolio code via predefined action
      - name: checkout code
        uses: actions/checkout@v4

      # set github pages to deploy the portfolio
      - name: setup the github pages
        uses: actions/configure-pages@v4

      # static code artifact upload to github pages
      - name: upload static files
        uses: actions/upload-pages-artifact@v4
        with:
          path: "."

      # git hub pages deploy action to deploy the portfolio
      - name: deploy to github pages
        uses: actions/deploy-pages@v4
